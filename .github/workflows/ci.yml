name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Compile check
        run: python -m compileall src tests

      - name: Run tests
        run: python -m pytest -q

      - name: Smoke test CLI
        run: |
          python -m explainlens.cli analyze \
            --input examples/sample_article.txt \
            --output outputs/ci_smoke_test
          test -f outputs/ci_smoke_test/cards.html
          test -f outputs/ci_smoke_test/cards.json
          test -f outputs/ci_smoke_test/cards.md
          test -f outputs/ci_smoke_test/run_summary.json
