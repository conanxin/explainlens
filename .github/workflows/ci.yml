name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Compile check
        run: python -m compileall src tests

      - name: Run tests
        run: python -m pytest -q

      - name: Smoke test text input
        run: |
          python -m explainlens.cli analyze \
            --input examples/sample_article.txt \
            --output outputs/ci_smoke_test
          test -f outputs/ci_smoke_test/cards.html
          test -f outputs/ci_smoke_test/cards.json
          test -f outputs/ci_smoke_test/cards.md
          test -f outputs/ci_smoke_test/run_summary.json
          test -f outputs/ci_smoke_test/source_index.json

      - name: Generate sample PDF
        run: python scripts/create_sample_pdf.py

      - name: Smoke test PDF input
        run: |
          python -m explainlens.cli analyze \
            --input examples/sample_paper.pdf \
            --output outputs/ci_pdf_smoke_test
          test -f outputs/ci_pdf_smoke_test/source_pages.json
          test -f outputs/ci_pdf_smoke_test/source_chunks.json
          test -f outputs/ci_pdf_smoke_test/cards.html
          test -f outputs/ci_pdf_smoke_test/run_summary.json
          test -f outputs/ci_pdf_smoke_test/source_index.json
          grep -q "Source Appendix" outputs/ci_pdf_smoke_test/cards.html
          grep -q "source-chunk_" outputs/ci_pdf_smoke_test/cards.html

      - name: Smoke test mock-llm text input
        run: |
          python -m explainlens.cli analyze \
            --input examples/sample_article.txt \
            --output outputs/ci_mock_smoke_test \
            --provider mock-llm
          test -f outputs/ci_mock_smoke_test/source_index.json
          test -f outputs/ci_mock_smoke_test/cards.html
          grep -q "Source Appendix" outputs/ci_mock_smoke_test/cards.html
          grep -q '"provider": "mock-llm"' outputs/ci_mock_smoke_test/run_summary.json
          grep -q '"uses_external_api": false' outputs/ci_mock_smoke_test/provider_manifest.json
          grep -q '"requires_api_key": false' outputs/ci_mock_smoke_test/provider_manifest.json

      - name: Smoke test mock-llm PDF input
        run: |
          python -m explainlens.cli analyze \
            --input examples/sample_paper.pdf \
            --output outputs/ci_mock_pdf_smoke_test \
            --provider mock-llm
          test -f outputs/ci_mock_pdf_smoke_test/source_pages.json
          test -f outputs/ci_mock_pdf_smoke_test/source_index.json
          test -f outputs/ci_mock_pdf_smoke_test/cards.html
          grep -q "Source Appendix" outputs/ci_mock_pdf_smoke_test/cards.html
          grep -q '"provider": "mock-llm"' outputs/ci_mock_pdf_smoke_test/run_summary.json
          grep -q '"uses_external_api": false' outputs/ci_mock_pdf_smoke_test/provider_manifest.json

      - name: Smoke test local-fixture text input
        run: |
          python -m explainlens.cli analyze \
            --input examples/sample_article.txt \
            --output outputs/ci_local_fixture_smoke_test \
            --provider local-fixture
          test -f outputs/ci_local_fixture_smoke_test/provider_manifest.json
          test -f outputs/ci_local_fixture_smoke_test/source_index.json
          test -f outputs/ci_local_fixture_smoke_test/cards.html
          grep -q '"provider": "local-fixture"' outputs/ci_local_fixture_smoke_test/provider_manifest.json
          grep -q '"uses_external_api": false' outputs/ci_local_fixture_smoke_test/provider_manifest.json
          grep -q "Source Appendix" outputs/ci_local_fixture_smoke_test/cards.html

      - name: Smoke test local-fixture prompt dump
        run: |
          python -m explainlens.cli analyze \
            --input examples/sample_article.txt \
            --output outputs/ci_prompt_dump_test \
            --provider local-fixture \
            --dump-provider-prompt
          test -f outputs/ci_prompt_dump_test/provider_prompt_pack.json
          ! grep -q "OPENAI_API_KEY" outputs/ci_prompt_dump_test/provider_prompt_pack.json
          ! grep -q "sk-" outputs/ci_prompt_dump_test/provider_prompt_pack.json

      - name: Providers CLI listing
        run: |
          python -m explainlens.cli providers

      - name: Check openai fail-closed (no --allow-external-api, should fail)
        run: |
          ! python -m explainlens.cli analyze \
            --input examples/sample_article.txt \
            --output outputs/ci_openai_fail_closed_test \
            --provider openai

      - name: Check openai fail-closed (--allow-external-api but no key, should fail)
        run: |
          ! python -m explainlens.cli analyze \
            --input examples/sample_article.txt \
            --output outputs/ci_openai_no_key_test \
            --provider openai \
            --allow-external-api

      - name: Check providers listing shows openai as experimental
        run: |
          python -m explainlens.cli providers | grep -q "openai"
          python -m explainlens.cli providers | grep -q "External API: yes"

      - name: Smoke test local-http fixture input
        run: |
          python -m explainlens.cli analyze \
            --input examples/sample_article.txt \
            --output outputs/ci_local_http_fixture \
            --provider local-http \
            --local-http-protocol fixture
          test -f outputs/ci_local_http_fixture/provider_manifest.json
          grep -q '"provider": "local-http"' outputs/ci_local_http_fixture/provider_manifest.json
          grep -q '"uses_external_api": false' outputs/ci_local_http_fixture/provider_manifest.json
          grep -q '"uses_local_http": false' outputs/ci_local_http_fixture/provider_manifest.json
          grep -q "Source Appendix" outputs/ci_local_http_fixture/cards.html

      - name: Check local-http fail-closed (should fail)
        run: |
          ! python -m explainlens.cli analyze \
            --input examples/sample_article.txt \
            --output outputs/ci_local_http_blocked \
            --provider local-http \
            --local-http-protocol ollama-chat \
            --local-http-endpoint http://localhost:11434/api/chat

      - name: Run doctor command (offline diagnostics)
        run: |
          python -m explainlens.cli doctor

      - name: Validate loopback endpoint (should pass)
        run: |
          python -m explainlens.cli validate-endpoint http://localhost:11434/api/chat

      - name: Validate remote endpoint (should fail)
        run: |
          ! python -m explainlens.cli validate-endpoint https://api.openai.com/v1/chat/completions

      - name: Image adapters CLI listing
        run: |
          python -m explainlens.cli image-adapters

      - name: Image styles CLI listing
        run: |
          python -m explainlens.cli image-styles

      - name: Smoke test image adapter (placeholder)
        run: |
          python -m explainlens.cli analyze \
            --input examples/sample_article.txt \
            --output outputs/ci_image_placeholder \
            --image-adapter placeholder
          test -f outputs/ci_image_placeholder/image_jobs.json
          test -f outputs/ci_image_placeholder/image_manifest.json
          grep -q '"uses_external_api": false' outputs/ci_image_placeholder/image_manifest.json
          grep -q 'images/card_' outputs/ci_image_placeholder/cards.html
          grep -q 'Source Appendix' outputs/ci_image_placeholder/cards.html

      - name: Smoke test image style (storybook)
        run: |
          python -m explainlens.cli analyze \
            --input examples/sample_article.txt \
            --output outputs/ci_image_storybook \
            --image-adapter placeholder \
            --image-style storybook
          test -f outputs/ci_image_storybook/image_manifest.json
          grep -q '"style": "storybook"' outputs/ci_image_storybook/image_manifest.json
          grep -q '"external_image_api": false' outputs/ci_image_storybook/image_manifest.json
          grep -q "Image Manifest" outputs/ci_image_storybook/cards.html

      - name: Smoke test image adapter (skip)
        run: |
          python -m explainlens.cli analyze \
            --input examples/sample_article.txt \
            --output outputs/ci_image_skip \
            --skip-images
          test -f outputs/ci_image_skip/image_jobs.json
          test ! -f outputs/ci_image_skip/image_manifest.json

      - name: Check docs/GALLERY.md exists
        run: |
          test -f docs/GALLERY.md
          grep -q "clean-cartoon-explainer" docs/GALLERY.md
          grep -q "Visual Export Gallery" docs/GALLERY.md

      - name: Check demo-preview.svg updated
        run: |
          test -f docs/assets/demo-preview.svg
          grep -q "v0.2" docs/assets/demo-preview.svg
