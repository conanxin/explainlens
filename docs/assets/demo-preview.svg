<svg viewBox="0 0 680 260" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif">
  <!-- Background -->
  <rect width="680" height="260" fill="#f4f7fb" rx="16"/>

  <!-- Title bar -->
  <rect width="680" height="44" fill="#1e3a8a" rx="16"/>
  <rect y="28" width="680" height="16" fill="#1e3a8a"/>
  <text x="340" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#bfdbfe" letter-spacing="0.5">ExplainLens — AI Teaching Director</text>

  <!-- Step 1: Input box -->
  <rect x="24" y="68" width="172" height="152" fill="#fff" rx="12" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="24" y="68" width="172" height="36" fill="#dbeafe" rx="12"/>
  <rect x="24" y="88" width="172" height="16" fill="#dbeafe"/>
  <text x="110" y="91" text-anchor="middle" font-size="11" font-weight="700" fill="#1e40af">Complex Content</text>
  <text x="35" y="122" font-size="9.5" fill="#64748b">Paper / Article / Doc</text>
  <rect x="35" y="130" width="150" height="6" fill="#e2e8f0" rx="3"/>
  <rect x="35" y="142" width="130" height="6" fill="#e2e8f0" rx="3"/>
  <rect x="35" y="154" width="145" height="6" fill="#e2e8f0" rx="3"/>
  <rect x="35" y="166" width="110" height="6" fill="#e2e8f0" rx="3"/>
  <rect x="35" y="178" width="138" height="6" fill="#e2e8f0" rx="3"/>
  <rect x="35" y="190" width="90" height="6" fill="#e2e8f0" rx="3"/>
  <text x="110" y="214" text-anchor="middle" font-size="9" fill="#94a3b8">.txt / .md supported</text>

  <!-- Arrow 1 -->
  <g transform="translate(210,144)">
    <line x1="0" y1="0" x2="44" y2="0" stroke="#3b82f6" stroke-width="2.5"/>
    <polygon points="44,0 36,-5 36,5" fill="#3b82f6"/>
    <text x="22" y="-8" text-anchor="middle" font-size="9" fill="#3b82f6" font-weight="600">parse + chunk</text>
    <text x="22" y="14" text-anchor="middle" font-size="8.5" fill="#94a3b8">heuristic analysis</text>
  </g>

  <!-- Step 2: Teaching Plan box -->
  <rect x="266" y="68" width="148" height="152" fill="#fff" rx="12" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="266" y="68" width="148" height="36" fill="#ede9fe" rx="12"/>
  <rect x="266" y="88" width="148" height="16" fill="#ede9fe"/>
  <text x="340" y="91" text-anchor="middle" font-size="11" font-weight="700" fill="#5b21b6">Teaching Plan</text>
  <!-- 8 steps -->
  <rect x="278" y="114" width="124" height="14" fill="#f5f3ff" rx="4"/>
  <text x="284" y="124" font-size="8.5" fill="#6d28d9">1 · What problem?</text>
  <rect x="278" y="132" width="124" height="14" fill="#f5f3ff" rx="4"/>
  <text x="284" y="142" font-size="8.5" fill="#6d28d9">2 · Why does it matter?</text>
  <rect x="278" y="150" width="124" height="14" fill="#f5f3ff" rx="4"/>
  <text x="284" y="160" font-size="8.5" fill="#6d28d9">3 · Old approach limits</text>
  <rect x="278" y="168" width="124" height="14" fill="#f5f3ff" rx="4"/>
  <text x="284" y="178" font-size="8.5" fill="#6d28d9">4–8 · Core concepts…</text>
  <text x="340" y="214" text-anchor="middle" font-size="9" fill="#94a3b8">8 steps · visual metaphors</text>

  <!-- Arrow 2 -->
  <g transform="translate(426,144)">
    <line x1="0" y1="0" x2="44" y2="0" stroke="#3b82f6" stroke-width="2.5"/>
    <polygon points="44,0 36,-5 36,5" fill="#3b82f6"/>
    <text x="22" y="-8" text-anchor="middle" font-size="9" fill="#3b82f6" font-weight="600">render cards</text>
    <text x="22" y="14" text-anchor="middle" font-size="8.5" fill="#94a3b8">JSON · MD · HTML</text>
  </g>

  <!-- Step 3: Cards area -->
  <rect x="482" y="68" width="172" height="152" fill="#fff" rx="12" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="482" y="68" width="172" height="36" fill="#dcfce7" rx="12"/>
  <rect x="482" y="88" width="172" height="16" fill="#dcfce7"/>
  <text x="568" y="91" text-anchor="middle" font-size="11" font-weight="700" fill="#166534">Explainer Cards</text>
  <!-- mini card grid -->
  <rect x="492" y="112" width="70" height="50" fill="#f0fdf4" rx="6" stroke="#86efac" stroke-width="1"/>
  <rect x="492" y="112" width="70" height="14" fill="#bbf7d0" rx="6"/>
  <rect x="492" y="116" width="70" height="10" fill="#bbf7d0"/>
  <text x="527" y="123" text-anchor="middle" font-size="7.5" fill="#166534" font-weight="600">Card 1</text>
  <rect x="497" y="130" width="58" height="5" fill="#d1fae5" rx="2"/>
  <rect x="497" y="139" width="48" height="5" fill="#d1fae5" rx="2"/>
  <rect x="497" y="148" width="55" height="5" fill="#d1fae5" rx="2"/>

  <rect x="570" y="112" width="70" height="50" fill="#eff6ff" rx="6" stroke="#93c5fd" stroke-width="1"/>
  <rect x="570" y="112" width="70" height="14" fill="#bfdbfe" rx="6"/>
  <rect x="570" y="116" width="70" height="10" fill="#bfdbfe"/>
  <text x="605" y="123" text-anchor="middle" font-size="7.5" fill="#1e40af" font-weight="600">Card 2</text>
  <rect x="575" y="130" width="58" height="5" fill="#dbeafe" rx="2"/>
  <rect x="575" y="139" width="44" height="5" fill="#dbeafe" rx="2"/>
  <rect x="575" y="148" width="52" height="5" fill="#dbeafe" rx="2"/>

  <rect x="492" y="170" width="148" height="14" fill="#fef3c7" rx="4"/>
  <text x="566" y="180" text-anchor="middle" font-size="8" fill="#92400e">8 cards · SVG placeholder · image prompts</text>

  <text x="568" y="214" text-anchor="middle" font-size="9" fill="#94a3b8">browser-ready HTML</text>

  <!-- Bottom caption -->
  <text x="340" y="250" text-anchor="middle" font-size="10" fill="#94a3b8">
    github.com/conanxin/explainlens · MIT License · v0.1.0-alpha
  </text>
</svg>
