<svg viewBox="0 0 680 280" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif">
  <!-- Background -->
  <rect width="680" height="280" fill="#f4f7fb" rx="16"/>

  <!-- Title bar -->
  <rect width="680" height="44" fill="#1e3a8a" rx="16"/>
  <rect y="28" width="680" height="16" fill="#1e3a8a"/>
  <text x="340" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#bfdbfe" letter-spacing="0.5">ExplainLens — AI Teaching Director (v0.2.x)</text>

  <!-- Step 1: Input box -->
  <rect x="20" y="68" width="146" height="172" fill="#fff" rx="12" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="20" y="68" width="146" height="36" fill="#dbeafe" rx="12"/>
  <rect x="20" y="88" width="146" height="16" fill="#dbeafe"/>
  <text x="93" y="91" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1e40af">PDF / Text Input</text>
  <text x="30" y="120" font-size="8.5" fill="#64748b">Paper · Article · Doc</text>
  <rect x="30" y="128" width="126" height="5" fill="#e2e8f0" rx="2.5"/>
  <rect x="30" y="138" width="110" height="5" fill="#e2e8f0" rx="2.5"/>
  <rect x="30" y="148" width="120" height="5" fill="#e2e8f0" rx="2.5"/>
  <rect x="30" y="158" width="90" height="5" fill="#e2e8f0" rx="2.5"/>
  <rect x="30" y="168" width="116" height="5" fill="#e2e8f0" rx="2.5"/>
  <text x="93" y="195" text-anchor="middle" font-size="8" fill="#94a3b8">PyMuPDF · .txt · .md</text>
  <!-- Provider tag -->
  <rect x="30" y="205" width="126" height="22" fill="#ede9fe" rx="4"/>
  <text x="93" y="220" text-anchor="middle" font-size="8" fill="#6d28d9" font-weight="600">provider: rule-based</text>

  <!-- Arrow 1 -->
  <g transform="translate(180,154)">
    <line x1="0" y1="0" x2="26" y2="0" stroke="#3b82f6" stroke-width="2.5"/>
    <polygon points="26,0 20,-4 20,4" fill="#3b82f6"/>
    <text x="13" y="-7" text-anchor="middle" font-size="8" fill="#3b82f6" font-weight="600">parse</text>
  </g>

  <!-- Step 2: Provider box -->
  <rect x="218" y="68" width="126" height="172" fill="#fff" rx="12" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="218" y="68" width="126" height="36" fill="#ede9fe" rx="12"/>
  <rect x="218" y="88" width="126" height="16" fill="#ede9fe"/>
  <text x="281" y="91" text-anchor="middle" font-size="10.5" font-weight="700" fill="#5b21b6">AI Provider</text>
  <rect x="228" y="114" width="106" height="14" fill="#f5f3ff" rx="4"/>
  <text x="234" y="124" font-size="8" fill="#6d28d9">1 · Concept Map</text>
  <rect x="228" y="132" width="106" height="14" fill="#f5f3ff" rx="4"/>
  <text x="234" y="142" font-size="8" fill="#6d28d9">2 · Teaching Plan</text>
  <rect x="228" y="150" width="106" height="14" fill="#f5f3ff" rx="4"/>
  <text x="234" y="160" font-size="8" fill="#6d28d9">3 · Storyboard</text>
  <rect x="228" y="168" width="106" height="14" fill="#f5f3ff" rx="4"/>
  <text x="234" y="178" font-size="8" fill="#6d28d9">4 · Cards</text>
  <!-- Source citation tag -->
  <rect x="228" y="192" width="106" height="22" fill="#fef3c7" rx="4"/>
  <text x="281" y="207" text-anchor="middle" font-size="7.5" fill="#92400e" font-weight="600">source citations</text>
  <text x="281" y="225" text-anchor="middle" font-size="7.5" fill="#94a3b8">5 providers</text>

  <!-- Arrow 2 -->
  <g transform="translate(356,154)">
    <line x1="0" y1="0" x2="26" y2="0" stroke="#3b82f6" stroke-width="2.5"/>
    <polygon points="26,0 20,-4 20,4" fill="#3b82f6"/>
    <text x="13" y="-7" text-anchor="middle" font-size="8" fill="#3b82f6" font-weight="600">render</text>
  </g>

  <!-- Step 3: Image adapter box -->
  <rect x="394" y="68" width="126" height="172" fill="#fff" rx="12" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="394" y="68" width="126" height="36" fill="#d1fae5" rx="12"/>
  <rect x="394" y="88" width="126" height="16" fill="#d1fae5"/>
  <text x="457" y="91" text-anchor="middle" font-size="10.5" font-weight="700" fill="#166534">Image Adapter</text>
  <rect x="404" y="114" width="106" height="14" fill="#ecfdf5" rx="4"/>
  <text x="410" y="124" font-size="8" fill="#166534">placeholder (SVG)</text>
  <rect x="404" y="132" width="106" height="14" fill="#ecfdf5" rx="4"/>
  <text x="410" y="142" font-size="8" fill="#166534">fixture (SVG)</text>
  <rect x="404" y="150" width="106" height="14" fill="#f0fdf4" rx="4"/>
  <text x="410" y="160" font-size="8" fill="#166534">4 image styles</text>
  <rect x="404" y="168" width="106" height="14" fill="#fef3c7" rx="4"/>
  <text x="410" y="178" font-size="8" fill="#92400e">no external API</text>
  <rect x="404" y="192" width="106" height="22" fill="#fef2f2" rx="4"/>
  <text x="457" y="207" text-anchor="middle" font-size="7.5" fill="#dc2626" font-weight="600">skip-images option</text>

  <!-- Arrow 3 -->
  <g transform="translate(532,154)">
    <line x1="0" y1="0" x2="26" y2="0" stroke="#3b82f6" stroke-width="2.5"/>
    <polygon points="26,0 20,-4 20,4" fill="#3b82f6"/>
    <text x="13" y="-7" text-anchor="middle" font-size="8" fill="#3b82f6" font-weight="600">export</text>
  </g>

  <!-- Step 4: Cards output -->
  <rect x="570" y="68" width="98" height="172" fill="#fff" rx="12" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="570" y="68" width="98" height="36" fill="#dcfce7" rx="12"/>
  <rect x="570" y="88" width="98" height="16" fill="#dcfce7"/>
  <text x="619" y="91" text-anchor="middle" font-size="10.5" font-weight="700" fill="#166534">Explainer</text>
  <!-- Cards output files -->
  <rect x="578" y="112" width="82" height="14" fill="#f0fdf4" rx="4"/>
  <text x="619" y="122" text-anchor="middle" font-size="7.5" fill="#166534" font-weight="600">cards.html</text>
  <rect x="578" y="130" width="82" height="14" fill="#eff6ff" rx="4"/>
  <text x="619" y="140" text-anchor="middle" font-size="7.5" fill="#1d4ed8" font-weight="600">cards.md</text>
  <rect x="578" y="148" width="82" height="14" fill="#faf5ff" rx="4"/>
  <text x="619" y="158" text-anchor="middle" font-size="7.5" fill="#6b21a8" font-weight="600">cards.json</text>
  <rect x="578" y="166" width="82" height="14" fill="#fefce8" rx="4"/>
  <text x="619" y="176" text-anchor="middle" font-size="7.5" fill="#92400e" font-weight="600">images/*.svg</text>
  <rect x="578" y="184" width="82" height="14" fill="#fff1f2" rx="4"/>
  <text x="619" y="194" text-anchor="middle" font-size="7.5" fill="#9f1239" font-weight="600">run_summary</text>
  <!-- Source appendix tag -->
  <rect x="578" y="205" width="82" height="22" fill="#fef3c7" rx="4"/>
  <text x="619" y="220" text-anchor="middle" font-size="7.5" fill="#92400e" font-weight="600">Source Appendix</text>

  <!-- Bottom caption -->
  <text x="340" y="268" text-anchor="middle" font-size="10" fill="#94a3b8">
    github.com/conanxin/explainlens · MIT License · v0.2.0-alpha
  </text>
</svg>
